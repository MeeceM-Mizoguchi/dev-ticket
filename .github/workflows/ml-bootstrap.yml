# ENHA2-034 デプロイ時の初回セットアップ
#
# ★デプロイした瞬間に、ログインの有無に関係なくサーバー側で全組織分を走らせる★
#   「管理者が画面を開いたら始まる」ではダメ。誰も開かなければ永久に始まらないため。
#
# main へ push（＝Vercelがデプロイ）されたら、
#   ① 全組織のスキル自動分析（実績 → メンバーのスキル・レベルを自動登録）
#   ② 全組織のモデル学習（LightGBM）
# を順に実行する。ユーザーは何もしない。次にログインしたときには終わっている。
#
# 以降は ml-daily.yml が毎日AM3時(JST)に同じことをする。
#
# 必要な Secrets:
#   APP_URL                     … 例 https://dev-ticket.vercel.app（末尾スラッシュなし）
#   CRON_SECRET                 … Vercel 側の環境変数と同じ値
#   VITE_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY

name: ML bootstrap (on deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Vercel のデプロイが立ち上がるのを待つ（①は新デプロイのAPIを叩くため）
      - name: Wait for deployment
        run: sleep 90

      # ── ① スキル自動分析（全組織） ──
      # organizationId を付けずに叩くと全組織を回る。
      # 変更のない組織は差分検知でスキップされるので、2回目以降も軽い。
      - name: Analyze skills (all orgs)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -f -X POST "$APP_URL/api/ml/analyze-skills" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' | head -c 2000
          echo

      # ── ② モデル学習（全組織） ──
      # 完了チケットが少ない組織は学習せず、ルールベースのまま運用される（train.py 内で判定）。
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - run: pip install -r ml/requirements.txt

      - name: Train models (all orgs)
        working-directory: ml
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python train.py
